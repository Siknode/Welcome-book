    es: >-
      Los coches particulares no circulan dentro del pueblo. Si viene
      conduciendo, estacione en el aparcamiento autorizado en la entrada de
      Jeri (desde R$ 30,00/día) y avise a la recepción para organizar el
      traslado del equipaje.

