    o ar-condicionado ligado quando estiver fora.
  en: >-
    The house voltage is 110V. As we are on a preserved island in the middle of the
    Atlantic Forest, please use water and energy consciously and avoid leaving the
    air conditioning on when you are out.
  es: >-
    El voltaje de la casa es de 110V. Como estamos en una isla preservada en medio
