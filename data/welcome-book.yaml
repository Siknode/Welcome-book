checkin:
  time: "14:00"
  checkout_time: "11:00"
  reception_hours: "08:00 às 21:00"
  luggage_storage: true
  access_steps:
    pt: >-
      Não há carros particulares na ilha. O acesso é feito por barco. Ao desembarcar
      no píer turístico da Vila do Abraão, siga em direção à praça da igreja. A casa
      fica a poucos minutos de caminhada. Se precisar de ajuda com a bagagem, você
      pode contratar um dos carregadores locais com seus carrinhos de mão no cais.
    en: >-
      There are no private cars on the island. Access is by boat. Upon disembarking
      at the tourist pier in Vila do Abraão, walk towards the church square. The
      house is just a few minutes' walk away. If you need help with luggage, you
      can hire one of the local luggage handlers with their handcarts at the pier.
    es: >-
      No hay coches particulares en la isla. El acceso es en barco. Al desembarcar
      en el muelle turístico de Vila do Abraão, camine hacia la plaza de la iglesia.
      La casa está a pocos minutos a pie. Si necesita ayuda con el equipaje, puede
      contratar a uno de los cargadores locales con sus carretillas en el muelle.
  door_code_info:
    pt: "A Mari ou alguém da equipe estará no local para recebê-lo e entregar as chaves."
    en: "Mari or someone from the staff will be on site to welcome you and hand over the keys."
    es: "Mari o alguien del equipo estará en el lugar para darle la bienvenida y entregarle las llaves."
  vehicle_info:
    pt: >-
      Carros particulares não entram em Ilha Grande. Se vier dirigindo, estacione
      em um dos estacionamentos seguros em Conceição de Jacareí ou Angra dos Reis
      (média de R$ 30,00 a R$ 50,00 por dia) antes de embarcar no flexboat.
    en: >-
      Private cars are not allowed on Ilha Grande. If driving, park at one of the
      secure parking lots in Conceição de Jacareí or Angra dos Reis (average R$ 30.00
      to R$ 50.00 per day) before boarding the flexboat.
    es: >-
      Los coches particulares no están permitidos en Ilha Grande. Si viene conduciendo,
      estacione en uno de los aparcamientos seguros en Conceição de Jacareí o Angra
      dos Reis (promedio de R$ 30,00 a R$ 50,00 por día) antes de embarcar en el flexboat.

